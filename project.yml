name: FitTrack
options:
  bundleIdPrefix: com.maximtschitschko
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "8936F2R3FF"
    ENABLE_PREVIEWS: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  FitTrackShared:
    path: Shared

targets:
  FitTrack:
    type: application
    platform: iOS
    sources:
      - path: FitTrack
    dependencies:
      - package: FitTrackShared
      - target: FitTrackWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maximtschitschko.fittrack
        INFOPLIST_FILE: FitTrack/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitTrack/FitTrack.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO

  FitTrackWatch:
    type: application
    platform: watchOS
    sources:
      - path: FitTrackWatch
    dependencies:
      - package: FitTrackShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maximtschitschko.fittrack.watchkitapp
        INFOPLIST_FILE: FitTrackWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitTrackWatch/FitTrackWatch.entitlements
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: NO
        WATCHOS_DEPLOYMENT_TARGET: "10.0"

schemes:
  FitTrack:
    build:
      targets:
        FitTrack: all
    run:
      config: Debug
    archive:
      config: Release
  FitTrackWatch:
    build:
      targets:
        FitTrackWatch: all
    run:
      config: Debug
      # LLDB muss beim Anhängen Debug-Symbole vom Gerät lesen, was über die
      # Watch-Verbindung spürbar lange dauert ("Launching ... taking longer
      # than expected"). Ohne Debugger-Attach startet die App sofort direkt
      # auf der Uhr. Für Breakpoint-Debugging in Xcode: Product > Scheme >
      # Edit Scheme > Run > "Debug executable" wieder anhaken.
      debugEnabled: false
    archive:
      config: Release
